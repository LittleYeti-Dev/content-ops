<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 500" font-family="Georgia, serif">
  <defs>
    <filter id="shadow3" x="-2%" y="-2%" width="104%" height="104%">
      <feDropShadow dx="2" dy="2" stdDeviation="2" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowLoop" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3A5A8C"/>
    </marker>
    <marker id="arrowHalt" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#C0392B"/>
    </marker>
  </defs>
  
  <text x="350" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#1B2A4A">Figure 3. Skipjack Protocol — Operational Loop</text>
  
  <!-- Center: Governance Core -->
  <circle cx="350" cy="260" r="55" fill="#1B2A4A" filter="url(#shadow3)"/>
  <text x="350" y="255" text-anchor="middle" font-size="13" font-weight="bold" fill="white">Governance</text>
  <text x="350" y="272" text-anchor="middle" font-size="10" fill="#B8C8E0">Core</text>
  
  <!-- Step 1: Validate (top) -->
  <rect x="275" y="60" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="350" y="85" text-anchor="middle" font-size="12" font-weight="bold" fill="white">1. Validate</text>
  <text x="350" y="102" text-anchor="middle" font-size="9" fill="#C8D8EC">Live state check</text>
  
  <!-- Step 2: Signal (right) -->
  <rect x="510" y="140" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="585" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="white">2. Signal</text>
  <text x="585" y="182" text-anchor="middle" font-size="9" fill="#C8D8EC">Uncertainty disclosure</text>
  
  <!-- Step 3: Execute (right-bottom) -->
  <rect x="510" y="320" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="585" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="white">3. Execute</text>
  <text x="585" y="362" text-anchor="middle" font-size="9" fill="#C8D8EC">Governance-gated</text>
  
  <!-- Step 4: Reconcile (bottom) -->
  <rect x="275" y="400" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="350" y="425" text-anchor="middle" font-size="12" font-weight="bold" fill="white">4. Reconcile</text>
  <text x="350" y="442" text-anchor="middle" font-size="9" fill="#C8D8EC">Checkpoint alignment</text>
  
  <!-- Step 5: Verify (left-bottom) -->
  <rect x="40" y="320" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="115" y="345" text-anchor="middle" font-size="12" font-weight="bold" fill="white">5. Verify</text>
  <text x="115" y="362" text-anchor="middle" font-size="9" fill="#C8D8EC">Runtime confirmation</text>
  
  <!-- Step 6: Adapt (left) -->
  <rect x="40" y="140" width="150" height="60" rx="30" fill="#3A5A8C" filter="url(#shadow3)"/>
  <text x="115" y="165" text-anchor="middle" font-size="12" font-weight="bold" fill="white">6. Adapt</text>
  <text x="115" y="182" text-anchor="middle" font-size="9" fill="#C8D8EC">Emergent iteration</text>
  
  <!-- Circular arrows connecting steps -->
  <path d="M425 80 Q510 60 520 140" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M620 200 Q650 280 620 320" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M520 380 Q460 430 425 430" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M275 430 Q200 440 160 380" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M80 320 Q50 260 80 200" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  <path d="M170 140 Q220 80 275 75" stroke="#3A5A8C" stroke-width="2" fill="none" marker-end="url(#arrowLoop)"/>
  
  <!-- Halt/Escalate path from center -->
  <rect x="250" y="470" width="200" height="25" rx="4" fill="#C0392B"/>
  <text x="350" y="488" text-anchor="middle" font-size="10" font-weight="bold" fill="white">HALT / ESCALATE if validation fails</text>
  <line x1="350" y1="315" x2="350" y2="400" stroke="#C0392B" stroke-width="1" stroke-dasharray="4"/>
</svg>
